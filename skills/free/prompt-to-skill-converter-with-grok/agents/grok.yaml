    This skill follows the open SKILL.md standard and is specifically optimized for **Grok** inside the **Grok Build CLI / TUI**.

permissions:
  profile: "Read + Documentation Generation"

  tools_used:
    terminal_shell: "No"
    read_files: "Sometimes – May read example prompts or previous conversations."
    write_files: "Yes – Required to generate the new SKILL.md file."
    browser: "No"
    network_access: "No"

  file_scopes:
    - "**/*.md"
