interface:
  display_name: "Prompt-to-Skill Converter with Grok"
  short_description: "Takes repetitive or vague prompts you keep writing and turns them into clean, reusable, well-structured SKILL.md files with clear triggers, boundaries, and output formats."
  default_prompt: "I keep using this prompt over and over. Please apply the Prompt-to-Skill Converter with Grok and turn it into a proper, reusable SKILL.md file."

metadata:
  price: 0
  tags:
    - grok
    - prompt-engineering
    - skill-authoring
    - productivity
    - meta
  version: 1.3.0
  target_agent: grok
  agensi_slug: prompt-to-skill-converter-with-grok

