interface:
  display_name: "Getting Started with Agensi MCP"
  short_description: "Beginner-friendly onboarding to set up the Agensi MCP connection for Claude Code."
  default_prompt: "I want to get started with Agensi skills that use MCP. Please walk me through setting it up for my current agent."

metadata:
  price: 0
  tags:
    - agensi
    - mcp
    - onboarding
    - setup
    - meta
    - free
    - cross-platform
    - multi-agent
  version: 1.0.0
  target_agent: claude
  agensi_slug: getting-started-with-agensi-mcp

compatibility:
  note: |
    Adapter instructions drafted for Claude Code, alongside tested support for Grok,
    Gemini, and Codex. Full end-to-end testing pending. It may need adaptations based
    on your specific OS environment and Claude Code version.

permissions:
  profile: "Setup & Light Analysis (Read + Network)"

  tools_used:
    terminal_shell: "Yes – Required to run the MCP proxy during setup."
    read_files: "Yes – Reads configuration and skill files."
    write_files: "Sometimes – Creates configuration files during setup."
    browser: "No"
    network_access: "Yes – Connects to the Agensi MCP server."

  file_scopes:
    - "mcp/"
    - "agents/"

  environment_variables:
    - "AGENSI_API_KEY (optional for basic local use; recommended for full marketplace access)"

  allowed_hosts:
    - "mcp.agensi.io"

  notes: |
    Claude Code supports MCP servers at three scopes:
    - local (default): current project only, not persisted to any shared file.
    - project: stored in .mcp.json at the project root; shared with your team.
    - user: stored in ~/.claude.json; available across all your projects.

    For personal use, "user" scope is usually the most convenient.
    For a shared team project, "project" scope is appropriate.

    After adding the server you will be prompted to approve it the first time it connects.