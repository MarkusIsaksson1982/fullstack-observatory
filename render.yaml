services:
  - type: web
    name: observatory-reference-docs
    env: node
    region: oregon
    plan: free
    rootDir: .
    nodeVersion: 22
    buildCommand: cd apps/mcp-server && npm install && npm run build:index
    startCommand: cd apps/mcp-server && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
