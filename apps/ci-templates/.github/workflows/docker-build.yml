name: Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name"
        required: true
        type: string
      context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t ${{ inputs.image-name }}:${{ github.sha }} \
            -t ${{ inputs.image-name }}:latest \
            -f ${{ inputs.dockerfile }} \
            ${{ inputs.context }}

      - name: Verify image
        run: docker image inspect ${{ inputs.image-name }}:latest

      - name: Run health check (if compose exists)
        if: hashFiles('docker-compose.yml') != ''
        run: |
          docker compose up -d --wait
          sleep 5
          curl -sf http://localhost:3000/health || curl -sf http://localhost:3000/ || echo "No health endpoint"
          docker compose down
