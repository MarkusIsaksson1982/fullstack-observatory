name: Docker Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fullstack-containerized .

      - name: Start services
        run: docker compose up -d --wait

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:3000/health || exit 1

      - name: Tear down
        if: always()
        run: docker compose down
