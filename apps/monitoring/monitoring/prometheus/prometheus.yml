global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: fullstack-monitoring
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:3000
    relabel_configs:
      - target_label: service
        replacement: fullstack-monitoring
