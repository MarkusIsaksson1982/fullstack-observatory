global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "hpc-rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'hpc-scheduler'
    static_configs:
      - targets: ['scheduler:8080']
    metrics_path: /metrics

  - job_name: 'hpc-node-agents'
    static_configs:
      - targets:
          - 'node-agent-1:9091'
          - 'node-agent-gpu-1:9091'

  - job_name: 'hpc-hooks'
    static_configs:
      - targets: ['metrics-exporter:9091']
